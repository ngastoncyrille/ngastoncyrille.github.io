name: Déploiement Portfolio sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configurer R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Installer les dépendances R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::ggplot2
            any::plotly
            any::leaflet
            any::dplyr
            any::tidyr
            any::sf
            any::terra
            any::evd
            any::cluster
            any::randomForest
            any::caret
            any::lubridate

      - name: Configurer Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.0"

      - name: Rendre le projet Quarto
        uses: quarto-dev/quarto-actions/render@v2

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v4

      - name: Uploader l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
