project:
  type: website
  output-dir: docs

website:
  title: "NEBIE Gaston Cyrille"
  description: "Ingénieur Hydrologue | Expert en Gestion des Risques Climatiques | Analyste de données"
  site-url: "https://ngastoncyrille.github.io"
  # favicon: assets/img/favicon.png   # Décommenter après ajout du fichier

  navbar:
    background: "white"
    foreground: "#023e8a"
    # logo: assets/img/logo_hz.png    # Décommenter après ajout du logo
    title: "💧 NGC"
    collapse-below: lg
    left:
      - text: "Accueil"
        href: index.qmd
        icon: house
      - text: "Profil"
        href: about.qmd
        icon: person
      - text: "Travaux"
        href: projects/index.qmd
        icon: folder
        # ↳ Regroupe : Projets R&D, Consultations, Formations
      - text: "Publications"
        href: publications.qmd
        icon: journal-text
        # ↳ Regroupe : Articles scientifiques, RPubs, HydroBurkina, Blog
      - text: "Contact"
        href: contact.qmd
        icon: envelope
    right:
      - icon: github
        href: https://github.com/ngastoncyrille
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/gaston-cyrille-nebie-a2a977222
        aria-label: LinkedIn

  page-footer:
    background: "#eaf4fb"
    foreground: "#4a6a80"
    border: true
    left: |
      © 2026 **NEBIE Gaston Cyrille** · Ingénieur Hydrologue
    center: |
      Fait avec [Quarto](https://quarto.org) & [R](https://www.r-project.org)
    right: |
      [RPubs](https://rpubs.com/nebiegc){target="_blank"} ·
      [GitHub](https://github.com/ngastoncyrille){target="_blank"}

  search:
    location: navbar
    type: overlay

  cookie-consent: false
  back-to-top-navigation: true

format:
  html:
    theme:
      - flatly
      - styles.scss
    toc: true
    toc-depth: 3
    toc-title: "Sommaire"
    toc-location: right
    number-sections: false
    code-fold: true
    code-tools: true
    code-copy: true
    code-link: false
    highlight-style: arrow-light
    link-external-icon: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    citations-hover: true
    footnotes-hover: true
    fig-align: center
    fig-cap-location: bottom

execute:
  warning: false
  message: false
  echo: true
  freeze: auto
